<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>
*{
    -webkit-tap-highlight-color: transparent;
}

body{
    background: transparent;
    text-align:center;
    font-family: 'DM Serif Display', serif;
    margin:0;
    padding:10px 15px;
}

.title{
    font-size: 22px;
    margin-bottom:20px;
}

.player-container{
    width:100%;
    max-width:280px;
    margin:auto;
}

input[type=range]{
    width:100%;
    appearance:none;
    -webkit-appearance:none;
    height:2px;
    background:black;
    outline:none;
}

input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    appearance:none;
    width:12px;
    height:12px;
    background:black;
    border-radius:50%;
    cursor:pointer;
}

.controls{
    margin-top:25px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;
}

button{
    background:none;
    border:none;
    outline:none;
    color:black;
    font-size:22px;
    cursor:pointer;
}

button:focus{
    outline:none;
}

.main-btn{
    width:55px;
    height:55px;
    background:black;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
}

.main-btn span{
    color:white;
    font-size:18px;
}
</style>
</head>

<body>

<div class="title">Dale clic para escuchar la canción</div>

<div class="player-container">
<input type="range" id="progress" value="0">

<div class="controls">
<button onclick="back()">&#9664;&#9664;</button>

<button class="main-btn" onclick="playPause()">
<span id="playIcon">▶</span>
</button>

<button onclick="forward()">&#9654;&#9654;</button>
</div>
</div>

<audio id="audio" src="https://raw.githubusercontent.com/brayanvelaserna/boda-audio/main/nuestra-cancion.mp3"></audio>

<script>
const audio = document.getElementById("audio");
const progress = document.getElementById("progress");
const playIcon = document.getElementById("playIcon");

audio.onloadedmetadata = function(){
    progress.max = audio.duration;
}

audio.ontimeupdate = function(){
    progress.value = audio.currentTime;
}

progress.oninput = function(){
    audio.currentTime = progress.value;
}

function playPause(){
    if(audio.paused){
        audio.play();
        playIcon.innerHTML = "❚❚";
    } else{
        audio.pause();
        playIcon.innerHTML = "▶";
    }
}

function back(){
    audio.currentTime = Math.max(0, audio.currentTime - 10);
}

function forward(){
    audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
}
</script>

</body>
</html>
