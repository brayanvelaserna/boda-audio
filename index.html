<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>
html,body{
    margin:0;
    padding:0;
    background:transparent;
    font-family:'DM Serif Display', serif;
}

.wrapper{
    width:260px;
    margin:auto;
    text-align:center;
}

.title{
    font-size:18px;
    margin-bottom:15px;
}

input[type=range]{
    width:100%;
    appearance:none;
    -webkit-appearance:none;
    height:2px;
    background:black;
    outline:none;
}

input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:10px;
    height:10px;
    background:black;
    border-radius:50%;
}

.controls{
    margin-top:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:18px;
}

button{
    background:none;
    border:none;
    color:black;
    font-size:18px;
    padding:0;
}

.main{
    width:45px;
    height:45px;
    background:black;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
}

.main span{
    color:white;
    font-size:16px;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="title">Dale clic para escuchar la canción</div>

<input type="range" id="progress" value="0">

<div class="controls">
<button onclick="back()">&#9664;&#9664;</button>

<button class="main" onclick="playPause()">
<span id="playIcon">▶</span>
</button>

<button onclick="forward()">&#9654;&#9654;</button>
</div>
</div>

<audio id="audio" src="https://raw.githubusercontent.com/brayanvelaserna/boda-audio/main/nuestra-cancion.mp3"></audio>

<script>
const audio = document.getElementById("audio");
const progress = document.getElementById("progress");
const playIcon = document.getElementById("playIcon");

audio.onloadedmetadata = () => progress.max = audio.duration;
audio.ontimeupdate = () => progress.value = audio.currentTime;
progress.oninput = () => audio.currentTime = progress.value;

function playPause(){
    if(audio.paused){
        audio.play();
        playIcon.innerHTML="❚❚";
    }else{
        audio.pause();
        playIcon.innerHTML="▶";
    }
}

function back(){
    audio.currentTime=Math.max(0,audio.currentTime-10);
}

function forward(){
    audio.currentTime=Math.min(audio.duration,audio.currentTime+10);
}
</script>

</body>
</html>
